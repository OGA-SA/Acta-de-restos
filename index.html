<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acta de restos</title>
  <link rel="stylesheet" href="estilo.css" />
</head>
<body>
  <div class="app-shell">
    <div id="escalado">
      <div id="contenidoPDF">
        <header class="titulo-principal">
          <h1>INFORME DE LIQUIDACION DE RESTOS</h1>
        </header>

        <section class="encabezado">
          <div class="top-grid">
            <div class="fecha-row">
              <label class="etiqueta-inline" for="fecha">FECHA</label>
              <div id="fecha" class="fecha-valor"></div>
            </div>
        
            <div class="campo campo-corto campo-siniestro">
              <label class="campo-label" for="siniestro1">SINIESTRO</label>
              <div class="inline-duo">
                <input type="text" id="siniestro1" />
                <input type="text" id="siniestro2" inputmode="numeric" pattern="\d{4}" maxlength="4" aria-label="Año siniestro" />
              </div>
            </div>
        
            <div class="campo campo-ancho campo-ubicacion">
              <label class="campo-label" for="ubicacion">LUGAR DE INSPECCION</label>
              <input type="text" id="ubicacion" />
            </div>
        
            <div class="campo campo-corto campo-matricula">
              <label class="campo-label" for="matricula">MATRICULA</label>
              <input type="text" id="matricula" />
            </div>
        
            <div class="campo campo-ancho campo-localidad">
              <label class="campo-label" for="localidad">LOCALIDAD</label>
              <input type="text" id="localidad" value="MONTEVIDEO" />
            </div>
        
            <div class="fila-marca campo-marca-row">
              <div class="campo marca-principal">
                <label class="campo-label" for="marca">MARCA</label>
                <input type="text" id="marca" />
              </div>
              <div class="campo marca-anio">
                <label class="campo-label sr-only" for="anio">AÑO</label>
                <input type="text" id="anio" aria-label="Año" />
              </div>
            </div>
        
            <div class="campo campo-corto campo-rosado campo-color">
              <label class="campo-label" for="color">COLOR</label>
              <input type="text" id="color" />
            </div>
        
            <div class="campo campo-ancho campo-modelo">
              <label class="campo-label" for="modelo">MODELO</label>
              <input type="text" id="modelo" />
            </div>
        
            <div class="campo campo-corto campo-rosado campo-motor">
              <label class="campo-label" for="motor">MOTOR</label>
              <input type="text" id="motor" />
            </div>
        
            <div class="campo campo-ancho campo-chasis">
              <label class="campo-label" for="chasis">CHASIS</label>
              <input type="text" id="chasis" />
            </div>
        
            <div class="tipo-cambio-wrap">
              <div class="tipo-cambio-label">Tipo Cambio</div>
              <input type="text" id="cambio" class="tipo-cambio-input" />
            </div>
          </div>
        </section>

        <section class="valores">
          <table id="tablaValor">
            <thead>
              <tr>
                <th class="vacio"></th>
                <th>U$S</th>
                <th>$U</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>VALOR VENAL AUTODATA (Automoviles // Vehiculos Pesados)</td>
                <td><input type="text" id="valorVenalAutodataUsd" /></td>
                <td><input type="text" id="valorVenalAutodataUy" /></td>
              </tr>
              <tr>
                <td>VALOR VENAL PLAZA (Motos)</td>
                <td><input type="text" id="valorVenalPlazaUsd" /></td>
                <td><input type="text" id="valorVenalPlazaUy" /></td>
              </tr>
              <tr>
                <td>VALOR ESTIMADO DE LA REPARACION</td>
                <td><input type="text" id="valorEstimadoReparacionUsd" /></td>
                <td><input type="text" id="valorEstimadoReparacionUy" /></td>
              </tr>
              <tr>
                <td>VALOR SUGERIDO DE RESTOS</td>
                <td><input type="text" id="valorSugeridoRestosUsd" /></td>
                <td><input type="text" id="valorSugeridoRestosUy" /></td>
              </tr>
              <tr>
                <td>VALOR MINIMO DE RESTOS</td>
                <td><input type="text" id="valorMinimoRestosUsd" /></td>
                <td><input type="text" id="valorMinimoRestosUy" /></td>
              </tr>
              <tr>
                <td>DEPRECIACIONES</td>
                <td><input type="text" id="depreciacionesUsd" /></td>
                <td><input type="text" id="depreciacionesUy" /></td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="observaciones-box">
          <div class="observaciones-header">
            <span>OBSERVACIONES</span>
          </div>
          <textarea id="nota"></textarea>
        </section>

        <section class="recuperables">
          <div class="recuperable-grid fila-1">
            <label for="insumioDesarme">INSUMIO DESARME</label>
            <select id="insumioDesarme">
              <option value=""></option>
              <option>SI</option>
              <option>NO</option>
            </select>

            <label for="horasDesarme">HORAS CORRESPONDIENTES</label>
            <input type="text" id="horasDesarme" class="celda-azul" />
          </div>

          <div class="recuperable-grid fila-2">
            <label for="vehiculoRecuperable">VEHICULO RECUPERABLE</label>
            <select id="vehiculoRecuperable">
              <option value=""></option>
              <option>SI</option>
              <option>NO</option>
            </select>

           <label for="tipoRecuperable" class="sin-subrayado"></label>
            <select id="tipoRecupero">
              <option value=""></option>
              <option>REMATE</option>
              <option>DESTRUCCIÓN</option>
              <option>CHATARRA CON BAJA DE MOTOR</option>
              <option>CHATARRA SIN BAJA DE MOTOR</option>
            </select>     
          </div>

          <div class="recuperable-grid fila-3">
            <label for="motorRecuperable">MOTOR RECUPERABLE</label>
            <select id="motorRecuperable">
              <option value=""></option>
              <option>SI</option>
              <option>NO</option>
            </select>              
            
           </div>
        </section>

       <section class="firmas">
          <div class="firma-linea">
            <label for="realizadoPor">Tasación realizada por:</label>
            <select id="realizadoPor" class="firma-input">
              <option value=""></option>
              <option>RODRIGO GINI</option>
              <option>FEDERICO ALBISTUR</option>
              <option>SEBASTIAN DE ÁVILA</option>
            </select>
          </div>
          <div class="uso-bse">Para Uso Exclusivo del BSE</div>
          <div class="bse-area"></div>
        </section>

        <input type="hidden" id="carpeta" />
        <input type="hidden" id="asegurado" />
        <input type="hidden" id="vehiculo" />
      </div>
    </div>

    <div id="boton" class="acciones">
      <button type="button" class="boton">Generar PDF</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  
 <script>
      function actualizarFecha() {
        const fechaDiv = document.getElementById("fecha");
        if (!fechaDiv) return;
    
        const hoy = new Date();
        const meses = [
          "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
          "Julio", "Agosto", "Setiembre", "Octubre", "Noviembre", "Diciembre"
        ];
    
        const dia = hoy.getDate();
        const mes = meses[hoy.getMonth()];
        const anio = hoy.getFullYear();
        fechaDiv.textContent = `${dia} de ${mes} de ${anio}`;
      }
    
      function actualizarEscala() {
        const escalado = document.getElementById("escalado");
        const contenido = document.getElementById("contenidoPDF");
        if (!escalado || !contenido) return;
    
        const baseWidth = 1100;
        const viewportWidth = Math.max(window.innerWidth - 32, 320);
        const scale = Math.min(viewportWidth / baseWidth, 1);
        escalado.style.setProperty("--scale", scale.toFixed(4));
        escalado.style.height = `${contenido.offsetHeight * scale}px`;
      }
    
      function generarPDF() {
        document.querySelector("#boton .boton")?.click();
      }
    
      function obtenerEscalaActual() {
        const escalado = document.getElementById("escalado");
        const value = getComputedStyle(escalado).getPropertyValue("--scale");
        const scale = parseFloat(value);
        return Number.isFinite(scale) && scale > 0 ? scale : 1;
      }
    
      function limpiarClonParaPlantilla(clone) {
        clone.querySelectorAll("input, textarea, select").forEach((el) => {
          if (el.type === "hidden") return;
    
          if (el.tagName === "SELECT") {
            el.selectedIndex = 0;
          } else if (el.type === "radio" || el.type === "checkbox") {
            el.checked = false;
          } else {
            el.value = "";
          }
        });
      }
    
      function obtenerCamposEditables() {
        const root = document.getElementById("contenidoPDF");
        const fields = [];
        let autoIndex = 0;
    
        root.querySelectorAll("input, textarea, select").forEach((el) => {
          if (el.type === "hidden") return;
          if (el.type === "radio" || el.type === "checkbox") return;
    
          const id = el.id || el.name || `campo_${++autoIndex}`;
          const value = el.tagName === "SELECT"
            ? (el.value || "")
            : (el.value || "").trim();
    
          fields.push({
            id,
            element: el,
            value,
            type: el.tagName.toLowerCase(),
            options: el.tagName === "SELECT"
              ? Array.from(el.options).map((o) => o.textContent.trim()).filter(Boolean)
              : []
          });
        });
    
        return fields;
      }

  function rectRelativoAPdf(element, container, scale, pageWidth, pageHeight) {
    const elRect = element.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();

    const left = (elRect.left - containerRect.left) / scale;
    const top = (elRect.top - containerRect.top) / scale;
    const width = elRect.width / scale;
    const height = elRect.height / scale;

    const x = (left / container.offsetWidth) * pageWidth;
    const y = pageHeight - ((top + height) / container.offsetHeight) * pageHeight;
    const w = (width / container.offsetWidth) * pageWidth;
    const h = (height / container.offsetHeight) * pageHeight;

    return { x, y, w, h };
  }

  async function generarPdfEditableBlob() {
    actualizarFecha();

    const { PDFDocument, StandardFonts } = PDFLib;

    const original = document.getElementById("contenidoPDF");
    const scale = obtenerEscalaActual();

    const cloneWrap = document.createElement("div");
    cloneWrap.style.position = "fixed";
    cloneWrap.style.left = "-20000px";
    cloneWrap.style.top = "0";
    cloneWrap.style.width = `${original.offsetWidth}px`;
    cloneWrap.style.background = "#fff";
    cloneWrap.style.zIndex = "-1";

    const clone = original.cloneNode(true);
    clone.style.transform = "none";
    clone.style.boxShadow = "none";
    clone.style.border = "none";
    clone.style.margin = "0";

    limpiarClonParaPlantilla(clone);

    cloneWrap.appendChild(clone);
    document.body.appendChild(cloneWrap);

    const canvas = await html2canvas(clone, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    });

    cloneWrap.remove();

    const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    const pngBytes = new Uint8Array(await pngBlob.arrayBuffer());

    const pdfDoc = await PDFDocument.create();
    const pageWidth = 595.28;
    const pageHeight = 841.89;
    const page = pdfDoc.addPage([pageWidth, pageHeight]);
    const image = await pdfDoc.embedPng(pngBytes);
    const form = pdfDoc.getForm();
    const font = await pdfDoc.embedFont(StandardFonts.Helvetica);

    page.drawImage(image, {
      x: 0,
      y: 0,
      width: pageWidth,
      height: pageHeight
    });

    const fields = obtenerCamposEditables();

    for (const field of fields) {
      const { id, element, value, type, options } = field;
      const rect = rectRelativoAPdf(element, original, scale, pageWidth, pageHeight);

      const fontSizePx = parseFloat(getComputedStyle(element).fontSize || "16");
      const fontSizePdf = Math.max(8, (fontSizePx / original.offsetWidth) * pageWidth);

      if (type === "textarea") {
        const tf = form.createTextField(id);
        tf.enableMultiline();
        tf.setText(value || "");
        tf.addToPage(page, {
          x: rect.x,
          y: rect.y,
          width: rect.w,
          height: rect.h,
          borderWidth: 0,
          font,
          fontSize: fontSizePdf
        });
        continue;
      }

      if (type === "select") {
        const dd = form.createDropdown(id);
        const cleanOptions = options.length ? options : [""];
        dd.addOptions(cleanOptions);

        if (value && cleanOptions.includes(value)) {
          dd.select(value);
        }

        dd.addToPage(page, {
          x: rect.x,
          y: rect.y,
          width: rect.w,
          height: rect.h,
          borderWidth: 0,
          font,
          fontSize: Math.max(8, fontSizePdf - 1)
        });
        continue;
      }

      const tf = form.createTextField(id);
      tf.setText(value || "");
      tf.addToPage(page, {
        x: rect.x,
        y: rect.y,
        width: rect.w,
        height: rect.h,
        borderWidth: 0,
        font,
        fontSize: fontSizePdf
      });
    }

    form.updateFieldAppearances(font);

    const pdfBytes = await pdfDoc.save();
    return new Blob([pdfBytes], { type: "application/pdf" });
  }

  document.addEventListener("DOMContentLoaded", () => {
    actualizarFecha();
    actualizarEscala();

    window.addEventListener("resize", actualizarEscala);

    const boton = document.querySelector("#boton .boton");
    if (!boton) return;

    boton.addEventListener("click", async (e) => {
      e.preventDefault();

      const siniestro1 = document.getElementById("siniestro1")?.value.trim() || "";
      const siniestro2 = document.getElementById("siniestro2")?.value.trim() || "";
      const ubicacion = document.getElementById("ubicacion")?.value.trim() || "";
      const localidad = document.getElementById("localidad")?.value.trim() || "";
      const matricula = document.getElementById("matricula")?.value.trim() || "";
      const marca = document.getElementById("marca")?.value.trim() || "";
      const modelo = document.getElementById("modelo")?.value.trim() || "";
      const color = document.getElementById("color")?.value.trim() || "";
      const motor = document.getElementById("motor")?.value.trim() || "";
      const chasis = document.getElementById("chasis")?.value.trim() || "";
      const cambio = document.getElementById("cambio")?.value.trim() || "";
      const realizadoPor = document.getElementById("realizadoPor")?.value.trim() || "";

      if (
        !siniestro1 ||
        !siniestro2 ||
        !ubicacion ||
        !localidad ||
        !matricula ||
        !marca ||
        !modelo ||
        !color ||
        !motor ||
        !chasis ||
        !cambio
      ) {
        alert("Complete Siniestro, Año y datos del vehículo antes de generar el PDF.");
        return;
      }

      if (!realizadoPor) {
        alert("Debe ingresar el nombre del tasador antes de generar el PDF.");
        return;
      }

      actualizarFecha();

      const ok = confirm(`¿El número de siniestro ingresado es correcto: ${siniestro1}-${siniestro2}?`);
      if (!ok) return;

      try {
        document.body.classList.add("modo-pdf");

        const blob = await generarPdfEditableBlob();

        const nombreArchivo = `${siniestro1}_${siniestro2}_Formulario_1_editable.pdf`;
        const formData = new FormData();
        formData.append("pdf", blob, nombreArchivo);
        formData.append("filename", nombreArchivo);
        formData.append("folder", "Formulario 1");

        const res = await fetch("https://extra-seguro-backend.onrender.com/upload", {
          method: "POST",
          body: formData
        });

        if (res.ok) {
          alert("PDF editable enviado y subido correctamente.");
        } else {
          alert(`Error al subir PDF: ${res.status}`);
        }
      } catch (err) {
        alert(`Error generando o subiendo el PDF editable: ${err?.message || err}`);
      } finally {
        document.body.classList.remove("modo-pdf");
        actualizarEscala();
      }
    });
  });
</script>

</body>
</html>
